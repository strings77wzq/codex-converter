# codex-converter 配置文件
# 首次运行 codex-converter 会通过交互式向导自动生成此文件
# 你也可以手动编辑
# ⚠️ 你只编辑本文件；~/.codex/config.toml 由 converter 自动管理，不要手动修改

default_provider = "deepseek"

[server]
port = 8080
host = "127.0.0.1"
# max_body_mb = 10  # 请求体大小限制，单位 MB（默认: 10）

# ============================================================
# 提供商配置
# model 必须与提供商 API 要求的名称完全一致，也是同步进 ~/.codex/config.toml 的默认模型
# auth_style: "bearer"（默认）或 "api_key_header"（MiMo 等用）
# ============================================================

[[providers]]
name = "deepseek"
base_url = "https://api.deepseek.com"
model = "deepseek-v4-pro"
api_key = "your-deepseek-api-key"
# api_key_env = "DEEPSEEK_API_KEY"    # 从环境变量读取（优先级低于 api_key）
auth_style = "bearer"
# context_window = 1000000            # 可选：同步到 Codex，控制 compact 行为

