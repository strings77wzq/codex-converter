# codex-converter 配置文件
# 首次运行 codex-converter 会自动生成此配置

default_provider = "default"

[server]
port = 8080
host = "127.0.0.1"

# 添加任何 Chat Completions 兼容的提供商
# 只需填写: name, base_url, model, api_key

[[providers]]
name = "default"
base_url = "https://api.xiaomimimo.com"
model = "mimo-v2.5-pro"
api_key = "your-api-key"
auth_style = "api_key_header"

