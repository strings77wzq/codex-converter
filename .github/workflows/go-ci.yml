name: Go CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          test -z "$(goimports -l .)"
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['stable', 'oldstable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Tests with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 43" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 43% threshold (setup 8.8% known — P1-2 tracked)"
            exit 1
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/codex-converter .
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: codex-converter
          path: dist/
